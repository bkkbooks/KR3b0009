body:
  text: 遵義章第五以明示下者暗有過不知者蔽迷而不返者惑以言取怨者禍令與心乖者廢後令繆前者毀怒而無威者犯好衆辱人者殃戮辱所任者危慢其所敬者凶貌合心離者孤親讒遠忠者亡近色遠賢者惛女謁公行者亂私人以官者浮凌下取勝者侵名不勝實者耗略己而責人者不治自厚而薄人者棄廢以過棄功者損群下外異者淪既用不任者踈行賞吝色者沮多許少與者怨既迎而拒者乖薄施厚望者不報貴而忘賤者不久念舊而棄新功者凶用人不得正者殆彊用人者不畜為人擇官者亂失其所彊者弱決策於不仁者險陰計外泄者敗厚斂薄施者凋戰士貧游士富者喪貨賂公行者昧聞善忽略記過不忘者暴所任不可信所信不可任者濁牧人以德者集繩人以刑者散小功不賞則大功不立小怨不赦則大怨必生賞不服人罰不甘心者叛賞及無功罰及無罪者酷聽讒而美聞諫而仇者亡能有其有者安貪人之有者殘右第五章言遵而行之者義也
