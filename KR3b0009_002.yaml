body:
  text: 正道章第二德足以懷遠信足以一異義足以得衆才足以鑒古明足以照下此人之俊也行足以為儀表智足以決嫌疑信可以使守約廉可以使分財此人之豪也守職而不廢處義而不回見嫌而不苟免見利而不苟得此人之傑也右第二章言道不可以非正
