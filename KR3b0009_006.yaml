body:
  text: 安禮章第六怨在不捨小過患在不預定謀福在積善禍在積惡飢在賤農寒在墮織安在得人危在失事富在迎來貧在棄時上無常操下多疑心輕上生罪侮下無親近臣不重遠臣輕之自疑不信人自信不疑人枉士無正友曲上無直下危國無賢人亂政無善人愛人深者求賢急樂得賢者養人厚國將霸者士皆歸邦將亡者賢先避地薄者大物不產水淺者大魚不遊樹禿者大禽不棲林踈者大獸不居山峭者崩澤滿者溢棄王取石者盲羊質虎皮者柔衣不舉領者倒走不視地者顛柱弱者屋壞輔弱者國傾足寒傷心人怨傷國山將崩者下先隳國將衰者人先獘根枯枝朽人困國殘與覆車同軌者傾與亡國同事者滅見已生者慎將生惡其跡者須避之畏危者安畏亡者存夫人之所行有道則吉無道則凶吉者百福所歸凶者百禍所攻非其神聖自然所鍾務善策者無惡事無遠慮者有近憂同志相得同仁相憂同惡相黨同愛相求同美相妬同智相謀同貴相害同利相忌同聲相應同氣相感同類相依同義相親同難相濟同道相成同藝相規同巧相勝此乃數之所得不可與理違釋己而教人者逆正己而化人者順逆者難從順者易行難從則亂易行則理如此理身理家理國可也右第六章言安而履之之謂禮
