body:
  text: 求人之志章第三絶嗜禁欲所以除纍抑非損惡所以讓過貶酒闕色所以無污避嫌遠疑所以不誤博學切問所以廣知高行微言所以修身恭儉謙約所以自守深計遠慮所以不窮親仁友直所以扶顛近恕篤行所以接人任材使能所以濟物殫惡斥讒所以止亂推古驗今所以不惑先揆後度所以應卒設變致權所以解結括囊順會所以無咎橛橛梗梗所以立功孜孜淑淑所以保終右第三章言志不可以妄求
