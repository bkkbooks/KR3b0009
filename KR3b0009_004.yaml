body:
  text: 本德宗道章第四夫志心篤行之術長莫長於博謀安莫安於忍辱先莫先於修德樂莫樂於好善神莫神於至誠明莫明於體物吉莫吉於知足苦莫苦於多願悲莫悲於精散病莫病於無常短莫短於苟得幽莫幽於貪鄙孤莫孤於自恃危莫危於任疑敗莫敗於多私右第四章言本宗不可以離道德
