body:
  text: 黄石公素書兵家類提要臣等謹案黄石公素書一卷舊本題宋張商英註分為六篇一曰原始二曰正道三曰求人之志四曰本徳宗道五曰遵義六曰安禮黄震日抄謂其説以道徳仁義禮五者為一體雖於指要無取而多主於卑謙損節背理者寡張商英妄為訓釋取老子先道而後徳先徳而後仁先仁而後義先義而後禮之説以言之遂與本書説正相反其意盖以商英之註為非而不甚斥本書之偽然觀其後序所稱圯上老人以授張子房晉亂有盜𤼵子房塜於玉枕中得之始傳人間又稱上有秘戒不許傳於不道不神不聖不賢之人若非其人必受其殃得人不傳亦受其殃尤為道家鄙誕之談故晁公武謂商英之言世未有信之者至明都穆聽雨紀談以為自晉迄宋學者未嘗一言及之不應獨出於商英而斷其有三偽胡應麟筆叢亦謂其書中悲莫悲於精散病莫病於無常皆仙經佛典之絶淺近者盖商英嘗學浮屠法於從悦喜講禪理此數語皆近其所為前後註文與本文亦多如出一手以是核之其即為商英所偽撰明矣以其言頗切理又宋以來相傳舊本姑録存之備參考焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀黄石公素書原序黄石公素書六篇按前漢黄石公圯橋所授子房素書世人多以三畧為是蓋傳之者誤也晉亂有盜發子房塚於玉枕中獲此書凡一千三百三十六言上有秘戒不許傳於不道不神不聖不賢之人若非其人必受其殃得人不傳亦受其殃嗚呼其慎重如此黄石公得子房而傳之子房不得其傳而𦵏之後五百餘年而盜獲之自是素書始傳於人間然其傳者特黄石公之言耳而公之意其可以言盡哉竊嘗評之天人之道未嘗不相為用古之聖賢皆盡心焉堯欽若昊天舜齊七政禹叙九疇傅説陳天道文王重八卦周公設天地四時之官又立三公以燮理隂陽孔子欲無言老耼建之以常無有隂符經曰宇宙在乎手萬化生乎身道至於此則鬼神變化皆不能逃吾之術而況於刑名度數之間者歟黄石公秦之隱君子也其書簡其意深雖堯舜禹文傅説周公孔老亦無以岀此矣然則黄石公知秦之將亡漢之將興故以此書授子房而子房者豈能盡知其書哉凡子房之所以為子房者僅能用其一二耳書曰隂計外泄者敗子房用之嘗勸髙帝王韓信矣書曰小怨不赦大怨不生子房用之嘗勸髙帝侯雍齒矣書曰決策於不仁者險子房用之嘗勸髙帝罷封六國矣書曰設變致權所以解結子房用之嘗致四皓而立恵帝矣書曰吉莫吉於知足子房用之嘗擇留自封矣書曰絶嗜禁欲所以除累子房用之嘗棄人間事從赤松子游矣嗟乎遺粕棄滓猶足以亡秦項而帝沛公況純而用之深而造之者乎自漢以來章句文章之學熾而知道之士極少如諸葛亮王猛房喬裴度等輩雖號為一時賢相至於先王大道曾未足以知髣髴此書所以不傳於不道不神不聖不賢之人也離有離無之謂道非有非無之謂神有而無之之謂聖無而有之之謂賢非此四者雖口誦此書亦不能身行之矣張商英天覺序欽定四庫全書黄石公素書宋張商英註原始章第一註曰道不可以無始夫道徳仁義禮五者一體也註曰離而用則有五合而渾之則為一一之所以貫五五所以衍一道者人之所蹈使萬物不知其所由註曰道之衣被萬物廣矣大矣一動息一語黙一出處一飲食大而八紘之表小而芒芥之内何適而非道也仁不足以名故仁者見之謂之仁智不足以盡故智者見之謂之智百姓不足以見故日用而不知也徳者人之所得使萬物各得其所欲註曰有求之謂欲欲而不得非徳之至也求於規矩者得方圓而已矣求於徳者無所欲而不得君臣父子得之以為君臣父子昆蟲草木得之以為昆蟲草木大得以成大小得以成小邇之一身逺之萬物無所欲而不得也仁者人之所親有慈恵惻隱之心以遂其生成註曰仁之為體如天天無不覆如海海無不容如雨露雨露無不潤慈恵惻隱所以用仁者也非親於天下而天下自親之無一夫不獲其所無一物不獲其生書曰鳥獸魚鼈咸若詩曰敦彼行葦牛羊勿踐履其仁之至也義者人之所宜賞善罰惡以立功立事註曰理之所在謂之義順理決斷所以行義賞善罰惡義之理也立功立事義之斷也禮者人之所履夙興夜寐以成人倫之序註曰禮履也朝夕之所履踐而不失其序者皆禮也言動視聽造次必於是放僻邪侈從何而生乎夫欲為人之本不可無一焉註曰老子曰失道而後徳失徳而後仁失仁而後義失義而後禮失禮者散也道散而為徳徳散而為仁仁散而為義義散而為禮五者未嘗不相為用而要其不散者道妙而已老子言其體故曰禮者忠信之薄而亂之道黄石公言其用故曰不可無一焉賢人君子明於盛衰之道通乎成敗之數審乎治亂之勢達乎去就之理註曰盛衰有道成敗有數治亂有勢去就有理故潛居抱道以待其時註曰道猶舟也時猶水也有舟楫之利而無江河以行之亦莫見其利涉也若時至而行則能極人臣之位得機而動則能成絶代之功如其不遇没身而已註曰養之有素及時而動機不容發豈容擬議者哉是以其道足髙而名重於後代註曰道髙則名垂於後而重矣正道章第二註曰道不可以非正徳足以懷逺註曰懷者中心悦而誠服之謂也信足以一異義足以得衆註曰有行有為而衆人宜之則得乎衆人矣才足以鑒古明足以照下此人之俊也行足以為儀表智足以決嫌疑註曰嫌疑之際非智不決信可以使守約亷可以使分財此人之豪也守軄而不廢註曰孔子為委吏乗田之職是也處義而不囘註曰迫於利害之際而確然守義者此不囘也見嫌而不茍免註曰周公不嫌於居攝召公則有所嫌也孔子不嫌於見南子子路則有所嫌也居嫌而不茍免其惟至明乎見利而不茍得此人之傑也註曰俊者峻於人也豪者髙於人傑者傑於人有徳有信有義有才有明者俊之事也有行有智有信有亷者豪之事也至於傑則才行足以明之矣然傑勝於豪豪勝於俊也求人之志章第三註曰志不可以妄求絶嗜禁欲所以除累註曰人性清靜本無係累嗜欲所牽捨己逐物抑非損惡所以禳過註曰禳猶祈禳而去之也非至於無抑惡至於無損過可以無禳爾貶酒闕色所以無汚註曰色敗精精耗則害神酒敗神神傷則害精避嫌逺疑所以不誤註曰於迹無嫌於心無疑事不悞爾博學切問所以廣知註曰有聖賢之質而不廣之以學問弗勉故也髙行㣲言所以修身註曰行欲髙而不屈言欲㣲而不張恭儉謙約所以自守深計逺慮所以不窮註曰管仲之計可謂能九合諸侯矣而窮於王道商鞅之計可謂能强國矣而窮於仁義𢎞羊之計可謂能聚財矣而窮於養民凡有窮者俱非計也親仁友直所以扶顛註曰聞譽而喜者不可以得友也近恕篤行所以接人註曰極髙明而道中庸聖賢之所以接人也髙明者聖賢之所獨中庸者衆人之所同也任材使能所以濟務註曰應變之謂材可用之謂能材者任之而不可使能者使之而不可任此用人之術也彈惡斥讒所以止亂註曰讒言惡行亂之根也推古驗今所以不惑註曰因古人之迹推古人之心以驗方今之事豈有惑哉揆揆後度所以應卒註曰執一尺之度而天下之長短盡在是矣倉卒事物之來而應之無窮者揆度有數也設變致權所以解結註曰有正有變有權有經方其權有所不能行則變而歸之於正也方其經有所不能用則權而歸之於經也括囊順㑹所以無咎註曰君子語黙以時岀處以道括囊而不見其美順㑹而不發其機所以免咎橛橛梗梗所以立功孜孜淑淑所以保終註曰橛橛者有所持而不可搖梗梗者有所立而不可撓孜孜者勤之又勤淑淑者善之又善立功莫如有守保終莫如無過也本徳宗道章第四註曰本宗不可以離道徳夫志心篤行之術長莫長於博謀註曰謀之欲博安莫安於忍辱註曰至道曠夷何辱之有先莫先於修徳註曰外以成物内以成己修徳也樂莫樂於好善神莫神於至誠註曰無所不通之謂神人之神與天地參而不能神於天地者以其不至誠也明莫明於體物註曰記曰清明在躬志氣如神如是則萬物之來其能逃吾之照乎吉莫吉於知足註曰知足之吉吉之又吉苦莫苦於多願註曰聖人之道泊然無欲其於物也來則應之去則無係未嘗有願也古之多願也莫如秦皇漢武國則願富兵則願彊功則願髙名則願貴宫室則願華麗姬嬪則願美艷四夷則願服神仙則願致然而國愈貧兵愈弱功愈卑名愈鈍卒至於所求不獲而遺恨狼狽者多願之所苦也夫治國者固不可多願至於賢人養身之方所守其可以不約乎悲莫悲於精散註曰道之所生之謂一純一之謂精精之所發之謂神其潛於無也則無生無死無先無後無隂無陽無動無靜其舎於形也則為明為哲為智為識血氣之品無不禀受正用之則聚而不散邪用之則散而不聚目淫於色則精散於色矣耳淫於聲則精散於聲矣口淫於味則精散於味矣鼻淫於臭則精散於臭矣散之於己其能久乎病莫病於無常註曰天地所以能常久者以其有常人而無常其不病乎短莫短於茍得註曰以不義得之必以不義失之未有茍得而能長也幽莫幽於貪鄙註曰以身狥物闇莫甚焉孤莫孤於自恃註曰桀紂自恃其才智伯自恃其彊項羽自恃其勇王莽自恃其智元載盧杞自恃其狡自恃則氣驕於外而善不入耳不聞善則孤而無助及其敗天下爭從而亡之危莫危於任疑註曰漢疑韓信而任之而信幾叛唐疑李懷光而任之而懷光遂逆敗莫敗於多私註曰賞不以功罰不以罪喜佞惡直親黨逺正小則結匹夫之怨大則激天下之怒此多私之所敗也遵義章第五註曰遵而行之者義也以明示下者闇註曰聖賢之道内明外晦惟不足於明者以明示下乃其所以闇也有過不知者蔽註曰聖人無過可知賢人之過造形而悟有過不知其愚蔽甚矣迷而不返者惑註曰迷於酒者不知其伐吾性也迷於色者不知其伐吾命也迷於利者不知其伐吾志也人本無迷惑者自迷之矣以言取怨者禍註曰行而言之則機在我而禍在人言而不行則機在人而禍在我令與心乖者廢註曰心以岀令令以行心後令繆前者毁註曰號令不一心無信而事毁棄矣怒而無威者犯註曰文王不大聲以色四國畏之故孔子曰不怒而民威於斧鉞好衆辱人者殃註曰己欲沽直名而置人於有過之地取殃之道也戮辱所任者危註曰人之云亡危亦隨之慢其所敬者凶註曰以長幼而言則齒也以朝廷而言則爵也以賢愚而言則徳也三者皆可敬而外敬則齒也爵也内敬則徳也貌合心離者孤親讒逺忠者亡註曰讒者善揣摩人主之意而忠者惟逆人主之過讒者合意多悦逆意者多怒此子胥殺而呉亡屈原放而楚滅是也近色逺賢者惛女謁公行者亂註曰太平公主韋庶人之禍是也私人以官者浮註曰淺浮者不足以勝名器如牛仙客為宰相之類是也凌下取勝者侵名不勝實者耗註曰陸贄曰名近於虚於教為重利近於實於義為輕然則實者所以致名名者所以權實名實相資則不耗匱矣畧己而責人者不治自厚而薄人者棄註曰聖人常善救人而無棄人常善救物而無棄物自厚者自滿也非仲尼所謂躬自厚之厚也自厚而薄人則人將棄廢矣以過棄功者損羣下外異者淪註曰措置失宜羣情隔塞阿諛並進人人異心求不淪亡不可得也既用不任者踈註曰用賢不任則失士心此管仲所謂害霸也行賞悋色者沮註曰色有靳悋有功者沮項羽之刓印是也多許少與者怨註曰失其本望既迎而拒者乖註曰劉璋迎劉備而返拒之是也薄施厚望者不報註曰天地不仁以萬物為芻狗聖人不仁以百姓為芻狗覆之載之含之育之非責其報也貴而忘賤者不久註曰道足於己者貴賤不足以為榮辱貴亦固有賤亦固有惟小人驟而處貴則忘其賤此所以不久也念舊而棄新功者凶註曰切齒於睚眦之怨眷眷於一飯之恩者匹夫之量有志於天下者雖仇必用以其才也雖怨必録以其功也漢髙祖侯雍齒録功也唐太宗相魏鄭公用才也用人不得正者殆彊用人者不畜註曰曹操强用闗侯而終歸劉備此不畜也為人擇官者亂失其所彊者弱註曰有以徳彊者有以人彊者有以勢彊者有以兵彊者堯舜有徳而彊桀紂無徳而弱湯武得人而彊幽厲失人而弱周得諸侯之勢而彊失諸侯之勢而弱唐得府兵而彊失府兵而弱其於人也善為彊惡為弱其於身也性為彊情為弱決策於不仁者險註曰不仁之人幸災樂禍隂計外泄者敗厚斂薄施者凋註曰凋削也文中子曰多斂其國其財必削戰士貧游士富者衰註曰游士鼓其頰舌惟幸烟塵之㑹戰士奮其死力專弭彊塲之虞富彼貧此兵勢衰矣貨賂公行者昧註曰私昧公曲昧直也聞善忽畧記過不忘者暴註曰暴則生怨所任不可信所信不可任者濁註曰濁溷也牧人以徳者集繩人以刑者散註曰刑者原於道徳之意而恕在其中是以先王以刑輔徳而非專用刑者也故曰牧之以徳則集繩之以刑則散也小功不賞則大功不立小怨不赦則大怨必生賞不服人罰不甘心者叛註曰人心不服則叛也賞及無功罰及無罪者酷註曰非所宜加者酷也聽讒而美聞諫而仇者亡能有其有者安貪人之有者殘註曰有吾之有有則心逸而安身安禮章第六註曰安而履之之謂禮怨在不捨小過患在不預定謀福在積善禍在積惡註曰善積則致於福惡積則致於禍無善無惡則亦無禍無福矣饑在賤農寒在惰織安在得人危在失士富在迎來註曰唐堯之節儉李悝之盡地力越王勾踐之十年生聚漢之平凖皆所以迎來之術也貧在棄時上無常躁下無疑心註曰躁靜無常喜怒不節羣情猜疑莫能自安輕上無罪侮下無親註曰輕上無禮侮下無恩近臣不重逺臣輕之註曰淮南王言去平津侯如發䝉耳自疑不信人註曰暗也自信不疑人註曰明也枉士無正友註曰李逢吉之友則八闗十六子之徒也曲上無直下註曰元帝之臣則𢎞恭石顯是也危國無賢人亂政無善人註曰非無賢人善人君不能用故也愛人深者求賢急樂得賢者養人厚註曰人不能自愛待賢而愛之人不能自養待賢而養之國將霸者士皆歸註曰趙殺鳴犢故夫子臨河而返邦將亡者賢先避註曰若微子去商仲尼去魯是也地薄者大物不産水淺者大魚不游樹秃者大禽不棲林疎者大獸不居註曰此四者以明人之淺則無道徳國之淺則無忠賢也山峭者崩澤滿者溢註曰此二者明過髙過滿之戒也棄玉取石者盲註曰有目與無目同羊質虎皮者辱註曰有表無裏與無表同衣不舉領者倒註曰當上而下走不視地者顛註曰當下而上柱弱者屋壞輔弱者國傾註曰材不勝任謂之弱足寒傷心人怨傷國註曰夫冲和之氣生於足而流於四肢而心為之君氣和則天君樂氣乖則天君傷矣山將崩者下先隳國將衰者人先弊註曰自古及今生齒富庶人民康樂而國衰者未之有也根枯枝朽人困國殘註曰長城之役興而秦國殘矣汴渠之役興而隋國殘矣與覆車同軌者傾與亡國同事者滅註曰漢武欲為秦皇之事幾至於傾而能有終者末年哀痛自悔也桀紂以女色亡而幽之褒姒同之漢以閹宦亡而唐之中尉同之見已生慎將生惡其迹者預避之註曰已生者見而去之也將生者慎而消之也惡其迹者急履而惡䠙不若廢履而無行妄動而惡知不若絀心而無動畏危者安畏亡者存夫人之所行有道則吉無道則凶吉者百福所歸凶者百禍所攻非其神聖自然所鍾註曰有道者非已求福而福自歸之無道者畏禍愈甚而禍愈攻之豈其有神聖為之主宰乃自然之理也務善策者無惡事無逺慮者有近憂重可使守固不可使臨陣貪可使攻取不可使分陣亷可使守主不可使應機此五者各隨其才而用之同志相得註曰舜則八元八凱湯則伊尹孔子則顔囘也同仁相憂註曰文王之閎散微子之父師少師周旦之召公管仲之鮑叔也同惡相黨註曰紂之臣億萬跖之徒九千是也同愛相求註曰愛利則聚斂之臣求之愛武則談兵之士求之愛勇則樂傷之士求之愛仙則方術之士求之愛符瑞則矯誣之士求之凡有愛者皆情之偏性之蔽也同美相妬註曰女則武后韋庶人張良娣是也男則趙髙李斯是也同智相謀註曰劉備曹操翟讓李宻是也同貴相害註曰勢相軋也同利相忌註曰害相刑也同聲相應同氣相感註曰五行五氣散於萬物自然相感同類相依同氣相親同難相濟註曰六國合從而拒秦諸葛亮通呉以敵魏非有仁義存焉特同難耳同道相成註曰漢承秦後海内凋弊蕭何以清靜涵養之何將亡念諸將俱喜功好動不足以知治道惟曹參在齊嘗治蓋公黄老術不務生事故引參以代相同藝相規註曰李䤈之賊扁鵲逢䝉之惡后羿是也規者非之也同巧相勝註曰公輸子九攻墨子九拒是也此乃數之所得不可與理違註曰自同志下所行所可預知智者知其如此順理則行之逆理則違之釋己而教人者逆正己而化人者順註曰教者以言化者以道老子曰法令滋彰盜賊多有教之逆者也我無為而民自化我無欲而民自順化之順者也逆者難從順者易行難從則亂易行則理註曰天地之道簡易而已聖人之道簡易而已順日月而晝夜之順隂陽而生殺之順山川而髙下之此天地之簡易也順邊陲而外之順中國而内之順君子而爵之順小人而役之順善惡而賞罰之順九土之宜而賦斂之順人倫而序之此聖人之簡易也夫烏獲非不力也執牛之尾而使之卻行則終日不能步㝷丈及以環桑之枝貫其鼻三尺之綯縻其頸童子服之風於大澤無所不至者蓋其勢順也詳體而行理身理家理國可也註曰小大不同其理一也黄石公素書右素書一帙蓋秦隱士黄石公之所傳漢留侯子房之所受者詞簡意深未易測識宋臣張商英叙之詳矣乃謂為不傳之秘書嗚呼凡一言之善一行之長尚可以垂範於人而不能秘是書黄石公秘焉得子房而後傳之子房獨知而能用寶而殉𦵏然猶在人間亦豈終得而秘之耶予承乏常徳府事政暇取而披閲之味其言率明而不晦切而不迂淡而不僻多中事機之㑹有益人世是又不可概以遊説之學縱横之術例之也但舊板刋行已久字多糢糊用是捐俸餘翻刻以廣其傳與四方君子共之𢎞治戊午嵗夏四月初吉蒲隂張官識黃石公素書後跋
