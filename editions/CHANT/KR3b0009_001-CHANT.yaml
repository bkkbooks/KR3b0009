body:
  text: 原始章第一夫道德仁義禮五者一體也道者人之所蹈使萬物不知其所由德者人之所得使萬物各得其所欲仁者人之所親有慈慧惻隱之心以遂其生成義者人之所宜賞善罰惡以立功立事禮者人之所履夙興夜寐以成人倫之序夫欲為人之本不可無一焉賢人君子明於盛衰之道通乎成敗之數審乎治亂之勢達乎去就之理故潛居抱道以待其時若時至而行則能極人臣之位得機而動則能成絕代之功如其不遇沒身而已是以其道足高而名重於後代右第一章言道不可以無始
